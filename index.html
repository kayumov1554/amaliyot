<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKK Tiplitsa Control</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="loader">
        <h1 class="tkk-text">TKK</h1>
        <div class="plants-anim">
            <i class="fas fa-seedling"></i>
            <i class="fas fa-leaf"></i>
            <i class="fas fa-tree"></i>
        </div>
        <p>Tiplitsa Tizimi yuklanmoqda...</p>
    </div>

    <main id="app" class="hidden">
        <header>
            <h1>TKK Monitoring</h1>
            <div id="current-time"></div>
            <button id="add-card-btn" onclick="openModal()"><i class="fas fa-plus"></i> Bugungi Card</button>
        </header>

        <section id="cards-container">
            </section>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Bugungi ma'lumotlar</h2>
            <div class="input-group">
                <label>Soni:</label>
                <input type="number" id="input-count" placeholder="0" oninput="calculatePreview()">
            </div>
            <div class="input-group">
                <label>Koeffitsient:</label>
                <input type="number" id="input-coeff" placeholder="1.0" step="0.1" oninput="calculatePreview()">
            </div>
            <div class="result-preview">
                Natija: <span id="preview-total">0</span>
            </div>
            <div class="modal-buttons">
                <button onclick="saveCard()" class="save-btn">Saqlash</button>
                <button onclick="closeModal()" class="close-btn">Yopish</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
