<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKK Tiplitsa PRO v4</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2ecc71; --dark: #2c3e50; --white: #ffffff; --accent: #3498db; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding-bottom: 80px; }
        
        /* --- 1. ANIMATSIYA VA LOADER --- */
        #loader { 
            position: fixed; width: 100%; height: 100vh; 
            background: var(--dark); display: flex; 
            flex-direction: column; align-items: center; 
            justify-content: center; color: var(--primary); 
            z-index: 3000; transition: opacity 0.6s ease; 
        }
        .tkk-text { font-size: 4.5rem; letter-spacing: 10px; animation: glow 2s infinite; margin: 0; }
        .plants-anim { font-size: 2.5rem; margin: 20px 0; }
        .plants-anim i { margin: 0 10px; animation: swing 3s infinite ease-in-out; }
        
        @keyframes glow { 0%, 100% { text-shadow: 0 0 15px var(--primary); opacity: 0.8; } 50% { text-shadow: 0 0 30px #fff; opacity: 1; } }
        @keyframes swing { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(15deg); } }

        /* --- 2. ASOSIY DIZAYN --- */
        header { background: var(--primary); padding: 20px; color: white; text-align: center; border-radius: 0 0 30px 30px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .stats-card { background: rgba(255,255,255,0.2); padding: 12px; border-radius: 15px; margin: 10px 0; border: 1px solid rgba(255,255,255,0.3); }
        #monthly-total { font-size: 1.7rem; font-weight: bold; }
        
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .nav-btn { background: rgba(255,255,255,0.3); border: none; padding: 10px 25px; border-radius: 20px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { background: white; color: var(--primary); transform: scale(1.05); }

        .content-section { padding: 15px; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; position: relative; border-left: 10px solid #ddd; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        
        .level-3000 { border-left-color: #f1c40f; background: #fffdf2; }
        .level-4000 { border-left-color: #e67e22; background: #fff9f2; }
        .level-5000 { border-left-color: #e74c3c; background: #fff5f5; }
        
        .card-header { display: flex; justify-content: space-between; color: #7f8c8d; font-size: 0.9rem; margin-bottom: 10px; }
        .card-val { font-size: 1.5rem; font-weight: bold; color: var(--dark); }

        /* --- 3. MODAL VA TARIX --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(5px); }
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 25px; border-radius: 25px; max-height: 85vh; overflow-y: auto; }
        input, textarea { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #eee; border-radius: 15px; box-sizing: border-box; font-size: 1rem; background: #f9f9f9; }
        
        .history-item { background: #fdfdfd; padding: 15px; border-radius: 15px; margin-top: 12px; border: 1px solid #f0f0f0; position: relative; }
        .hist-top { display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .item-delete-btn { position: absolute; top: 12px; right: 12px; color: #e74c3c; cursor: pointer; font-size: 1.2rem; }
        .hist-comment { font-size: 0.85rem; color: #666; margin-top: 6px; border-left: 3px solid var(--primary); padding-left: 8px; }

        #add-btn-fixed { position: fixed; bottom: 30px; right: 30px; background: var(--primary); color: white; width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 8px 25px rgba(46, 204, 113, 0.5); border: none; z-index: 500; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="loader">
        <h1 class="tkk-text">TKK</h1>
        <div class="plants-anim">
            <i class="fas fa-seedling"></i>
            <i class="fas fa-leaf"></i>
            <i class="fas fa-tree"></i>
        </div>
        <p style="letter-spacing: 2px; font-weight: 300;">Тепличный Комплекс Камчатский</p>
    </div>

    <header>
        <div class="stats-card">
            <small>Месячный доход</small>
            <div id="monthly-total">0 рублей</div>
        </div>
        <div class="nav-tabs">
            <button class="nav-btn active" onclick="switchTab('current', this)">Текущей</button>
            <button class="nav-btn" onclick="switchTab('archive', this)">Архив</button>
        </div>
    </header>

    <section id="current-section" class="content-section">
        <div id="cards-container"></div>
    </section>

    <section id="archive-section" class="content-section hidden">
        <div id="archive-container"></div>
    </section>

    <button id="add-btn-fixed" onclick="openModal()"><i class="fas fa-plus"></i></button>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title" style="margin-top:0; color:var(--dark);">Добавить</h3>
            <input type="number" id="input-count" placeholder="Количество" oninput="calc()">
            <input type="number" id="input-coeff" placeholder="Коэффициент" step="0.1" oninput="calc()">
            <textarea id="input-comment" placeholder="Комментарии" rows="2"></textarea>
            
            <div style="background:#eafaf1; padding:15px; border-radius:15px; text-align:center; font-weight:bold; margin:10px 0; color:var(--primary); font-size:1.1rem;">
                Qiymat: <span id="preview-total">0</span> рублей
            </div>
            
            <button onclick="saveEntry()" style="width:100%; background:var(--primary); color:white; border:none; padding:15px; border-radius:15px; font-weight:bold; font-size:1rem; cursor:pointer;">Добавить</button>
            <button onclick="closeModal()" style="width:100%; background:#f1f2f6; border:none; padding:12px; border-radius:15px; margin-top:10px; cursor:pointer;">Назад</button>
            
            <div id="history-list" style="margin-top:25px"></div>
        </div>
    </div>

    <script>
        let cards = JSON.parse(localStorage.getItem('tkk_data')) || [];
        let editingCardId = null;

        // 1. Animatsiyani boshqarish
        window.onload = () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    checkMonthTransition();
                    renderAll();
                }, 600);
            }, 3500); // 2.5 sekund ko'rinib turadi
        };

        // 2. Bir kunda bir card mantiqi
        function openModal(id = null) {
            const today = new Date().toLocaleDateString();
            const existingCard = cards.find(c => c.date === today);

            if (id === null) {
                editingCardId = existingCard ? existingCard.id : null;
                document.getElementById('modal-title').innerText = existingCard ? "Сегодняшний" : "Новая Карта";
            } else {
                editingCardId = id;
                const c = cards.find(x => x.id === id);
                document.getElementById('modal-title').innerText = c.date + "информации";
            }

            // Inputlarni tozalash
            document.getElementById('input-count').value = '';
            document.getElementById('input-coeff').value = '';
            document.getElementById('input-comment').value = '';
            document.getElementById('preview-total').innerText = '0';

            document.getElementById('modal').style.display = 'flex';
            renderHistory();
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            editingCardId = null;
        }

        function calc() {
            const c = document.getElementById('input-count').value || 0;
            const k = document.getElementById('input-coeff').value || 0;
            document.getElementById('preview-total').innerText = (c * k).toLocaleString();
        }

        function saveEntry() {
            const c = parseFloat(document.getElementById('input-count').value);
            const k = parseFloat(document.getElementById('input-coeff').value);
            const comment = document.getElementById('input-comment').value || "Izoh yo'q";
            
            if(!c || !k) return alert("Пожалуйста посмотрите на данные");

            const val = c * k;
            const newEntry = { id: Date.now(), c, k, val, comment };
            const today = new Date().toLocaleDateString();

            if (editingCardId) {
                cards = cards.map(card => {
                    if (card.id === editingCardId) {
                        card.history.push(newEntry);
                        card.total = card.history.reduce((s, item) => s + item.val, 0);
                    }
                    return card;
                });
            } else {
                const newCard = {
                    id: Date.now(),
                    date: today,
                    total: val,
                    history: [newEntry]
                };
                cards.push(newCard);
                editingCardId = newCard.id;
            }

            localStorage.setItem('tkk_data', JSON.stringify(cards));
            renderAll();
            renderHistory();
            
            // Tozalash
            document.getElementById('input-count').value = '';
            document.getElementById('input-coeff').value = '';
            document.getElementById('input-comment').value = '';
            document.getElementById('preview-total').innerText = '0';
        }

        function deleteEntry(cardId, entryId) {
            if(!confirm("Ushbu yozuv o'chirilsinmi?")) return;
            cards = cards.map(card => {
                if(card.id === cardId) {
                    card.history = card.history.filter(e => e.id !== entryId);
                    card.total = card.history.reduce((s, item) => s + item.val, 0);
                }
                return card;
            });
            cards = cards.filter(card => card.history.length > 0);
            localStorage.setItem('tkk_data', JSON.stringify(cards));
            renderAll();
            renderHistory();
        }

        function renderAll() {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            let monthTotal = 0;

            cards.sort((a,b) => b.id - a.id).forEach(card => {
                monthTotal += card.total;
                let lvl = card.total >= 5000 ? 'level-5000' : card.total >= 4000 ? 'level-4000' : card.total >= 3000 ? 'level-3000' : '';
                container.innerHTML += `
                    <div class="card ${lvl}" onclick="openModal(${card.id})">
                        <div class="card-header">
                            <span><i class="far fa-calendar-alt"></i> ${card.date}</span>
                            <i class="fas fa-trash-alt" style="color:#d1d8e0" onclick="event.stopPropagation(); deleteCard(${card.id})"></i>
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center">
                            <div>
                                <div class="card-val">${card.total.toLocaleString()} рублей</div>
                                <small>${card.history.length} ta yozuv kiritilgan</small>
                            </div>
                            <div style="font-size: 32px">${card.total >= 5000 ? '🌳' : card.total >= 3000 ? '🌿' : '🌱'}</div>
                        </div>
                    </div>`;
            });
            document.getElementById('monthly-total').innerText = monthTotal.toLocaleString() + "рублей";
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            const card = cards.find(c => c.id === editingCardId);
            list.innerHTML = card ? '<b style="color:var(--dark)">История</b>' : '';
            if(card) {
                card.history.slice().reverse().forEach(h => {
                    list.innerHTML += `
                        <div class="history-item">
                            <div class="hist-top">
                                <span>${h.c} x ${h.k} = ${h.val.toLocaleString()}</span>
                                <i class="fas fa-times-circle item-delete-btn" onclick="deleteEntry(${card.id}, ${h.id})"></i>
                            </div>
                            <div class="hist-comment">${h.comment}</div>
                        </div>`;
                });
            }
        }

        function deleteCard(id) {
            if(confirm("Удалить все данные сегодняшний?")) {
                cards = cards.filter(c => c.id !== id);
                localStorage.setItem('tkk_data', JSON.stringify(cards));
                renderAll();
            }
        }

        function switchTab(tab, btn) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('current-section').classList.toggle('hidden', tab !== 'current');
            document.getElementById('archive-section').classList.toggle('hidden', tab !== 'archive');
            document.getElementById('add-btn-fixed').classList.toggle('hidden', tab !== 'current');
            if(tab === 'archive') renderArchive();
        }

        function checkMonthTransition() {
            const now = new Date();
            const key = `${now.getFullYear()}-${now.getMonth()}`;
            const lastKey = localStorage.getItem('tkk_last_month');
            if (lastKey && lastKey !== key) {
                let archives = JSON.parse(localStorage.getItem('tkk_archives')) || [];
                if (cards.length > 0) {
                    archives.push({ id: Date.now(), monthName: lastKey, total: cards.reduce((s, c) => s + c.total, 0) });
                    localStorage.setItem('tkk_archives', JSON.stringify(archives));
                    localStorage.setItem('tkk_data', "[]");
                    cards = [];
                }
            }
            localStorage.setItem('tkk_last_month', key);
        }

        function renderArchive() {
            const container = document.getElementById('archive-container');
            const archives = JSON.parse(localStorage.getItem('tkk_archives')) || [];
            container.innerHTML = archives.length ? '' : '<p style="text-align:center; color:#999; margin-top:50px;">Arxivda hozircha oylik hisobotlar yo\'q.</p>';
            archives.reverse().forEach(arc => {
                container.innerHTML += `<div class="card" style="border-left:8px solid var(--accent)">
                    <small style="color:#7f8c8d">Месячный Доход</small>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
                        <b style="font-size:1.1rem">${arc.monthName}</b>
                        <b style="color:var(--accent); font-size:1.2rem">${arc.total.toLocaleString()} рублей</b>
                    </div>
                </div>`;
            });
        }
    </script>
</body>
</html>
